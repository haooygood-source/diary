<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e8e0d4">
<title>나의 다이어리</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Gaegu:wght@300;400;700&family=Do+Hyeon&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#d4cfc8;
  --cover-front:#3d3530;
  --cover-back:#2e2923;
  --page:#faf7f0;
  --page2:#f5f0e8;
  --line:#ddd5c0;
  --margin-line:#e8c4b0;
  --ink:#3a3028;
  --ink2:#5a4a3a;
  --muted:#9a8a7a;
  --spine:#2a2018;
  --tape1:#f0d090;
  --tape2:#c8e0d0;
  --tape3:#e0c8e0;
  --tape4:#c8d8f0;
  --tape5:#f0c8c0;
  --stamp:#8b6060;
}

body{
  background:var(--bg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Gaegu',cursive;
  overflow:hidden;
  background-image:
    repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(0,0,0,0.015) 40px,rgba(0,0,0,0.015) 41px);
}

/* ===== BOOK WRAPPER ===== */
#book-wrap{
  perspective:2000px;
  width:min(360px,94vw);
  height:min(520px,88vh);
  position:relative;
}

#book{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
}

/* ===== BOOK BASE (back cover always visible) ===== */
.book-back{
  position:absolute;
  inset:0;
  background:linear-gradient(160deg,#2e2923,#1e1810);
  border-radius:3px 16px 16px 3px;
  box-shadow:6px 6px 30px rgba(0,0,0,0.5),inset -2px 0 6px rgba(0,0,0,0.3);
}

/* ===== SPINE ===== */
.spine{
  position:absolute;
  left:-10px;
  top:4px;
  bottom:4px;
  width:14px;
  background:linear-gradient(to right,#1a120a,#2e2218,#1a120a);
  border-radius:3px 0 0 3px;
  box-shadow:-2px 0 8px rgba(0,0,0,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  writing-mode:vertical-rl;
  font-family:'Nanum Pen Script',cursive;
  font-size:9px;
  color:rgba(255,220,160,0.5);
  letter-spacing:2px;
  z-index:5;
}

/* ===== PAGE STACK (depth illusion) ===== */
.page-stack{
  position:absolute;
  inset:2px 0 2px 0;
  border-radius:2px 14px 14px 2px;
  overflow:hidden;
}
.page-stack-layer{
  position:absolute;
  inset:0;
  border-radius:2px 14px 14px 2px;
}

/* ===== PAGES ===== */
.page{
  position:absolute;
  inset:0;
  background:var(--page);
  border-radius:2px 14px 14px 2px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  transform-origin:left center;
  transition:none;
  box-shadow:inset -1px 0 3px rgba(0,0,0,0.08);
}
.page.active{display:flex;}
.page.flipping-out{
  display:flex;
  animation:flipOut 0.45s cubic-bezier(0.4,0,0.6,1) forwards;
  z-index:20;
}
.page.flipping-in{
  display:flex;
  animation:flipIn 0.45s cubic-bezier(0.4,0,0.6,1) forwards;
  z-index:15;
}

@keyframes flipOut{
  0%{transform:perspective(1200px) rotateY(0deg);box-shadow:inset -1px 0 3px rgba(0,0,0,0.08);}
  50%{transform:perspective(1200px) rotateY(-90deg);box-shadow:-8px 0 20px rgba(0,0,0,0.3);}
  100%{transform:perspective(1200px) rotateY(-180deg);opacity:0;}
}
@keyframes flipIn{
  0%{transform:perspective(1200px) rotateY(180deg);opacity:0;}
  50%{transform:perspective(1200px) rotateY(90deg);box-shadow:-8px 0 20px rgba(0,0,0,0.2);}
  100%{transform:perspective(1200px) rotateY(0deg);}
}

/* lined bg */
.page-lines{
  position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(transparent,transparent 31px,var(--line) 31px,var(--line) 32px);
  top:72px;
}
.page-margin-line{
  position:absolute;top:72px;bottom:0;left:44px;width:1px;
  background:var(--margin-line);opacity:0.7;pointer-events:none;
}

/* ===== COVER PAGE ===== */
#cover-page{
  background:linear-gradient(145deg,#3d3530 0%,#2e2418 100%);
  border-radius:2px 14px 14px 2px;
  color:#f0e8d8;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:2rem 1.5rem;
  position:relative;
  overflow:hidden;
}

#cover-page::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 30% 20%,rgba(255,200,100,0.08) 0%,transparent 50%),
    radial-gradient(circle at 70% 80%,rgba(200,160,100,0.06) 0%,transparent 50%);
}

/* Cover texture lines */
#cover-page::after{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 3px,rgba(255,255,255,0.015) 3px,rgba(255,255,255,0.015) 4px
  );
  pointer-events:none;
}

.cover-label{
  font-size:0.65rem;letter-spacing:4px;color:rgba(255,220,160,0.5);
  margin-bottom:1.2rem;text-transform:uppercase;position:relative;
}

.cover-title{
  font-family:'Nanum Pen Script',cursive;
  font-size:2.8rem;
  color:#f0e0c0;
  line-height:1.1;
  margin-bottom:0.4rem;
  position:relative;
  text-shadow:0 2px 8px rgba(0,0,0,0.3);
}

.cover-year{
  font-family:'Do Hyeon',sans-serif;
  font-size:1rem;letter-spacing:6px;
  color:rgba(255,210,140,0.6);
  margin-bottom:2rem;position:relative;
}

/* Cover washi tape deco */
.cover-tape{
  position:absolute;
  width:80px;height:18px;
  opacity:0.7;
  border-left:1px solid rgba(255,255,255,0.3);
  border-right:1px solid rgba(255,255,255,0.3);
}

.cover-name-wrap{
  position:relative;
  width:100%;max-width:200px;
  margin-bottom:2rem;
}
.cover-name-label{
  font-size:0.75rem;color:rgba(255,210,140,0.6);
  letter-spacing:2px;display:block;margin-bottom:0.3rem;
}
.cover-name-input{
  font-family:'Nanum Pen Script',cursive;
  font-size:1.5rem;
  background:transparent;
  border:none;
  border-bottom:1px solid rgba(255,210,140,0.4);
  color:#f0e0c0;
  width:100%;text-align:center;
  outline:none;padding:0.2rem;
}
.cover-name-input::placeholder{color:rgba(255,210,140,0.25);}

.start-btn{
  background:transparent;
  border:1px solid rgba(255,210,140,0.5);
  color:rgba(255,210,140,0.8);
  font-family:'Gaegu',cursive;
  font-size:1rem;
  padding:0.6rem 2rem;
  border-radius:4px;
  cursor:pointer;
  letter-spacing:2px;
  position:relative;
  transition:all 0.2s;
}
.start-btn:hover,.start-btn:active{
  background:rgba(255,210,140,0.15);
  color:#f0e0c0;
}

/* cover corner decorations */
.cover-corner{
  position:absolute;
  width:30px;height:30px;
  opacity:0.3;
}
.cover-corner.tl{top:16px;left:16px;border-top:1.5px solid #f0d090;border-left:1.5px solid #f0d090;}
.cover-corner.tr{top:16px;right:16px;border-top:1.5px solid #f0d090;border-right:1.5px solid #f0d090;}
.cover-corner.bl{bottom:16px;left:16px;border-bottom:1.5px solid #f0d090;border-left:1.5px solid #f0d090;}
.cover-corner.br{bottom:16px;right:16px;border-bottom:1.5px solid #f0d090;border-right:1.5px solid #f0d090;}

/* ===== MONTH OVERVIEW PAGE ===== */
.month-page{background:var(--page2);}

.page-header{
  height:64px;
  display:flex;align-items:flex-end;
  padding:0 12px 8px 52px;
  border-bottom:1.5px solid var(--line);
  flex-shrink:0;
  position:relative;
  gap:6px;
}

/* Tape strip on header */
.header-tape{
  position:absolute;
  top:-2px;
  height:14px;
  border-radius:1px;
  opacity:0.65;
}

.page-header-title{
  font-family:'Nanum Pen Script',cursive;
  font-size:1.7rem;
  color:var(--ink);
  line-height:1;
}
.page-header-sub{
  font-size:0.75rem;color:var(--muted);
  letter-spacing:1px;
  padding-bottom:4px;
}

.page-num{
  margin-left:auto;
  font-size:0.7rem;color:var(--muted);
  font-family:'Do Hyeon',sans-serif;
  letter-spacing:1px;
  padding-bottom:4px;
}

/* ===== DAILY ENTRY PAGE ===== */
.daily-page{background:var(--page);}

.daily-header{
  height:64px;
  display:flex;align-items:flex-end;
  padding:0 12px 8px 52px;
  border-bottom:1.5px solid var(--line);
  flex-shrink:0;
  position:relative;
  gap:8px;
  flex-wrap:wrap;
}

.day-big{
  font-family:'Nanum Pen Script',cursive;
  font-size:2.4rem;
  color:var(--ink);
  line-height:1;
  padding-bottom:2px;
}
.day-info{
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding-bottom:4px;
}
.day-weekday{font-size:0.7rem;color:var(--muted);letter-spacing:2px;}
.day-month{font-family:'Nanum Pen Script',cursive;font-size:1rem;color:var(--ink2);}

.weather-row{
  margin-left:auto;
  display:flex;gap:3px;
  padding-bottom:4px;
  align-items:flex-end;
}
.w-btn{
  background:none;border:1px solid var(--line);
  border-radius:50%;width:26px;height:26px;
  font-size:0.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;flex-shrink:0;
}
.w-btn.on{background:var(--tape1);border-color:#c8a840;transform:scale(1.1);}

/* mood stickers row */
.mood-row{
  display:flex;gap:4px;padding:6px 12px 4px 52px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;overflow-x:auto;
  scrollbar-width:none;
  align-items:center;
}
.mood-row::-webkit-scrollbar{display:none;}
.mood-tag{
  font-size:0.75rem;padding:2px 8px;
  border:1px solid var(--line);border-radius:20px;
  cursor:pointer;color:var(--ink2);white-space:nowrap;
  background:transparent;font-family:'Gaegu',cursive;
  transition:all 0.15s;flex-shrink:0;
}
.mood-tag.on{background:var(--tape3);border-color:#b090c0;}
.mood-section-label{
  font-size:0.65rem;color:var(--muted);
  letter-spacing:1px;white-space:nowrap;flex-shrink:0;
}

/* content area */
.page-body{
  flex:1;
  padding:8px 12px 8px 52px;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}

.diary-ta{
  font-family:'Nanum Pen Script',cursive;
  font-size:1.15rem;
  color:var(--ink);
  background:transparent;
  border:none;outline:none;
  resize:none;
  flex:1;
  line-height:32px;
  width:100%;
  min-height:0;
}
.diary-ta::placeholder{color:rgba(100,80,60,0.25);font-size:1rem;}

/* sticker area overlay */
.sticker-overlay{
  position:absolute;inset:0;
  pointer-events:none;
}
.placed-st{
  position:absolute;
  font-size:1.6rem;
  pointer-events:all;
  cursor:grab;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  animation:stPop 0.25s cubic-bezier(0.34,1.56,0.64,1);
  line-height:1;
}
@keyframes stPop{from{transform:scale(0) rotate(-20deg);}to{transform:scale(1) rotate(0)}}

/* decorative tape strips on pages */
.deco-tape{
  position:absolute;
  height:14px;
  border-radius:1px;
  pointer-events:none;
  opacity:0.55;
}

/* ===== MONTH CALENDAR GRID ===== */
.cal-grid{
  padding:8px 8px 4px 8px;
  flex:1;
  display:flex;flex-direction:column;
  gap:4px;overflow-y:auto;
}
.cal-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);
  text-align:center;
  font-size:0.6rem;letter-spacing:1px;
  color:var(--muted);
  padding:0 2px;
  flex-shrink:0;
}
.cal-weekdays span:first-child{color:#c06060;}
.cal-weekdays span:last-child{color:#6080c0;}

.cal-days{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;flex-shrink:0;
}
.cal-day{
  aspect-ratio:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-size:0.85rem;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.15s;
  position:relative;
  border:1px solid transparent;
  font-family:'Gaegu',cursive;
  color:var(--ink);
}
.cal-day:hover,.cal-day:active{background:rgba(0,0,0,0.05);}
.cal-day.has-entry{font-weight:700;}
.cal-day.has-entry::after{
  content:'';position:absolute;
  bottom:3px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;
  background:var(--stamp);
}
.cal-day.today{
  background:var(--tape1);border-color:#c8a840;
  font-weight:700;
}
.cal-day.sun{color:#c06060;}
.cal-day.sat{color:#6080c0;}
.cal-day.empty{cursor:default;}

/* mini stats */
.month-stats{
  display:flex;gap:6px;
  padding:6px 8px;
  border-top:1px solid var(--line);
  flex-shrink:0;
}
.stat-pill{
  flex:1;background:rgba(0,0,0,0.04);
  border-radius:8px;padding:4px 6px;text-align:center;
}
.stat-val{font-family:'Nanum Pen Script',cursive;font-size:1.4rem;color:var(--ink);display:block;}
.stat-key{font-size:0.6rem;color:var(--muted);letter-spacing:1px;display:block;}

/* ===== STICKER DRAWER ===== */
.sticker-drawer{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--page);
  border-top:1.5px solid var(--line);
  padding:6px 8px 8px;
  transform:translateY(100%);
  transition:transform 0.25s ease;
  z-index:30;
  border-radius:0 0 14px 14px;
}
.sticker-drawer.open{transform:translateY(0);}
.st-drawer-title{
  font-size:0.65rem;letter-spacing:2px;color:var(--muted);
  margin-bottom:5px;display:flex;justify-content:space-between;
  align-items:center;
}
.st-close{background:none;border:none;cursor:pointer;font-size:0.9rem;color:var(--muted);}
.st-grid{display:flex;flex-wrap:wrap;gap:4px;}
.st-item{
  font-size:1.4rem;padding:4px;border-radius:6px;
  cursor:pointer;transition:all 0.12s;
  background:none;border:none;
}
.st-item:active{transform:scale(1.3);}

/* ===== NAVIGATION ===== */
.nav-bar{
  position:absolute;bottom:0;left:0;right:0;
  height:42px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 8px;
  background:rgba(250,247,240,0.95);
  border-top:1px solid var(--line);
  border-radius:0 0 14px 14px;
  z-index:25;
}
.nav-side{display:flex;gap:4px;align-items:center;}

.nb{
  background:none;border:1px solid var(--line);
  border-radius:6px;
  font-family:'Gaegu',cursive;font-size:0.8rem;
  color:var(--ink2);padding:3px 8px;cursor:pointer;
  transition:all 0.12s;white-space:nowrap;
}
.nb:active{background:var(--line);}
.nb:disabled{opacity:0.25;pointer-events:none;}
.nb.accent{background:var(--stamp);color:white;border-color:var(--stamp);}

.save-indicator{
  font-size:0.65rem;color:var(--muted);
  letter-spacing:1px;
}
.save-indicator.saved{color:#6a9a6a;}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:calc(42px + 12px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--ink);color:#f0e8d8;
  font-family:'Gaegu',cursive;font-size:0.9rem;
  padding:5px 16px;border-radius:20px;
  opacity:0;transition:all 0.25s;
  z-index:999;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== SCROLLBAR ===== */
.page-body::-webkit-scrollbar,.cal-grid::-webkit-scrollbar{width:3px;}
.page-body::-webkit-scrollbar-thumb,.cal-grid::-webkit-scrollbar-thumb{background:var(--line);}
.page-body{overflow-y:auto;}

/* stamp decoration */
.stamp-deco{
  position:absolute;
  border:1.5px solid currentColor;
  border-radius:3px;
  padding:2px 5px;
  font-size:0.55rem;letter-spacing:1.5px;
  opacity:0.35;
  font-family:'Do Hyeon',sans-serif;
  pointer-events:none;
  transform:rotate(-8deg);
}
</style>
</head>
<body>

<div id="book-wrap">
  <!-- back cover always present -->
  <div class="book-back"></div>
  <div class="spine">DIARY</div>

  <!-- page stack depth illusion -->
  <div class="page-stack">
    <div class="page-stack-layer" style="background:#e8e0d0;right:-1px;border-radius:2px 15px 15px 2px;"></div>
    <div class="page-stack-layer" style="background:#f0e8d8;right:-2px;border-radius:2px 16px 16px 2px;"></div>
  </div>

  <div id="book">
    <!-- pages dynamically inserted -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ───────── DATA ─────────
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const WDAYS = ['일','월','화','수','목','금','토'];
const WEATHERS = ['☀️','⛅','🌥️','🌧️','❄️','🌈'];
const MOODS = ['행복','설렘','평온','피곤','슬픔','화남','그리움','설레'];
const STICKERS = [
  '⭐','🌟','✨','💫','🎀','🎁','🎈','🎉',
  '🍀','🌿','🌱','🍃','🍓','🍰','🧁','☕',
  '🐱','🐰','🐻','🦊','🌸','🌻','🌷','🌺',
  '📌','📎','✂️','🖊️','📷','🎵','🎶','💌',
  '🫧','🧸','🕯️','🪴','🔖','💎','🪞','🧣'
];
const TAPE_COLORS=['#f0d090','#c8e0d0','#e0c8e0','#c8d8f0','#f0c8c0','#d0e8c0','#f0e0c0'];
const STAMP_TEXTS=['DIARY','DAILY','MEMO','NOTE','TODAY','MY DAY'];

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let currentDayPage = null; // {year,month,day}
let currentView = 'cover'; // cover | month | day
let ownerName = '';

// Storage
function storageKey(y,m,d){return `diary_${y}_${m}_${d}`;}
function loadEntry(y,m,d){
  try{return JSON.parse(localStorage.getItem(storageKey(y,m,d))||'null');}catch{return null;}
}
function saveEntry(y,m,d,data){
  localStorage.setItem(storageKey(y,m,d),JSON.stringify(data));
}
function getAllEntries(y,m){
  const days=daysInMonth(y,m);
  const entries=[];
  for(let d=1;d<=days;d++){
    const e=loadEntry(y,m,d);
    if(e&&(e.text||e.mood||e.weather)) entries.push({d,e});
  }
  return entries;
}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function firstDayOfMonth(y,m){return new Date(y,m,1).getDay();}

// ───────── BOOK RENDER ─────────
const book = document.getElementById('book');
let isFlipping = false;

function getActivePage(){return book.querySelector('.page.active');}

function flipTo(buildFn, direction='forward'){
  if(isFlipping)return;
  const old = getActivePage();
  if(!old) {
    const np = buildFn();
    np.classList.add('active');
    book.appendChild(np);
    return;
  }
  isFlipping = true;
  const np = buildFn();
  book.appendChild(np);

  if(direction==='forward'){
    old.classList.add('flipping-out');
    np.classList.add('flipping-in');
    setTimeout(()=>{
      old.remove();
      np.classList.remove('flipping-in');
      np.classList.add('active');
      isFlipping=false;
    },450);
  } else {
    old.classList.add('flipping-out');
    np.classList.add('flipping-in');
    setTimeout(()=>{
      old.remove();
      np.classList.remove('flipping-in');
      np.classList.add('active');
      isFlipping=false;
    },450);
  }
}

// ───────── COVER PAGE ─────────
function buildCoverPage(){
  const div = document.createElement('div');
  div.className = 'page';
  div.id = 'page-cover';
  div.innerHTML=`
    <div id="cover-page">
      <div class="cover-corner tl"></div>
      <div class="cover-corner tr"></div>
      <div class="cover-corner bl"></div>
      <div class="cover-corner br"></div>

      <div class="cover-tape" style="top:28px;left:30px;background:${TAPE_COLORS[0]};transform:rotate(-5deg);"></div>
      <div class="cover-tape" style="top:28px;right:20px;background:${TAPE_COLORS[1]};transform:rotate(4deg);"></div>
      <div class="cover-tape" style="bottom:36px;left:20px;background:${TAPE_COLORS[2]};transform:rotate(3deg);"></div>
      <div class="cover-tape" style="bottom:36px;right:30px;background:${TAPE_COLORS[3]};transform:rotate(-4deg);"></div>

      <div class="cover-label">PERSONAL DIARY</div>
      <div class="cover-title">나의 일기장</div>
      <div class="cover-year">${currentYear}</div>

      <div class="cover-name-wrap">
        <span class="cover-name-label">이름</span>
        <input class="cover-name-input" id="cover-name-input"
          type="text" placeholder="이름을 적어요" maxlength="12"
          value="${ownerName}">
      </div>
      <button class="start-btn" onclick="doStart()">일기 시작하기</button>
    </div>
  `;
  return div;
}

function doStart(){
  const inp = document.getElementById('cover-name-input');
  ownerName = inp.value.trim()||'소중한 나';
  localStorage.setItem('diary-owner', ownerName);
  currentView = 'month';
  flipTo(()=>buildMonthPage(currentYear, currentMonth), 'forward');
}

// ───────── MONTH PAGE ─────────
function buildMonthPage(y, m){
  const div = document.createElement('div');
  div.className = 'page month-page';
  div.id = `page-month-${y}-${m}`;

  const tapeIdx = m % TAPE_COLORS.length;
  const days = daysInMonth(y, m);
  const firstDay = firstDayOfMonth(y, m);
  const entries = getAllEntries(y, m);
  const entryDays = new Set(entries.map(e=>e.d));
  const today = new Date();
  const isThisMonth = (y===today.getFullYear()&&m===today.getMonth());

  // build calendar cells
  let calCells='';
  for(let i=0;i<firstDay;i++) calCells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const dow = (firstDay+d-1)%7;
    const cls=[
      'cal-day',
      dow===0?'sun':(dow===6?'sat':''),
      entryDays.has(d)?'has-entry':'',
      (isThisMonth&&d===today.getDate())?'today':''
    ].filter(Boolean).join(' ');
    calCells+=`<div class="${cls}" onclick="gotoDay(${y},${m},${d})">${d}</div>`;
  }

  const totalEntries = entries.length;
  const writtenDays = entries.filter(e=>e.e&&e.e.text&&e.e.text.trim()).length;

  div.innerHTML=`
    <div class="page-lines"></div>
    <div class="deco-tape header-tape" style="left:52px;top:-2px;width:70px;background:${TAPE_COLORS[tapeIdx]};"></div>
    <div class="deco-tape" style="right:16px;top:8px;width:50px;background:${TAPE_COLORS[(tapeIdx+2)%7]};transform:rotate(2deg);"></div>

    <div class="page-header">
      <div class="page-header-title">${MONTHS[m]}</div>
      <div class="page-header-sub">${y}</div>
      <div class="page-num">${ownerName}의 일기</div>
    </div>

    <div class="cal-grid">
      <div class="cal-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="cal-days">${calCells}</div>
    </div>

    <div class="month-stats">
      <div class="stat-pill">
        <span class="stat-val">${days}</span>
        <span class="stat-key">DAYS</span>
      </div>
      <div class="stat-pill">
        <span class="stat-val">${totalEntries}</span>
        <span class="stat-key">기록</span>
      </div>
      <div class="stat-pill">
        <span class="stat-val">${writtenDays}</span>
        <span class="stat-key">일기</span>
      </div>
      <div class="stat-pill">
        <span class="stat-val">${days-totalEntries}</span>
        <span class="stat-key">남은날</span>
      </div>
    </div>

    <div class="nav-bar">
      <div class="nav-side">
        <button class="nb" onclick="changeMonth(-1)">◀ 이전달</button>
      </div>
      <button class="nb" onclick="flipTo(()=>buildCoverPage(),'backward');currentView='cover';">표지</button>
      <div class="nav-side">
        <button class="nb" onclick="changeMonth(1)">다음달 ▶</button>
      </div>
    </div>
  `;
  return div;
}

function changeMonth(delta){
  currentMonth += delta;
  if(currentMonth > 11){currentMonth=0;currentYear++;}
  if(currentMonth < 0){currentMonth=11;currentYear--;}
  flipTo(()=>buildMonthPage(currentYear,currentMonth), delta>0?'forward':'backward');
  currentView='month';
}

function gotoDay(y,m,d){
  currentDayPage={y,m,d};
  currentView='day';
  flipTo(()=>buildDayPage(y,m,d),'forward');
}

// ───────── DAY PAGE ─────────
function buildDayPage(y, m, d){
  const entry = loadEntry(y,m,d)||{weather:'',mood:'',text:'',stickers:[]};
  if(!entry.stickers) entry.stickers=[];

  const div = document.createElement('div');
  div.className = 'page daily-page';
  div.id = `page-day-${y}-${m}-${d}`;

  const dow = new Date(y,m,d).getDay();
  const wdayLabel = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'][dow];
  const tapeIdx = d % TAPE_COLORS.length;
  const stampText = STAMP_TEXTS[d % STAMP_TEXTS.length];
  const hasPrev = d > 1;
  const hasNext = d < daysInMonth(y,m);

  const wBtns = WEATHERS.map(w=>
    `<button class="w-btn${entry.weather===w?' on':''}" data-w="${w}" onclick="toggleWeather(this,'${w}')">${w}</button>`
  ).join('');

  const moodBtns = MOODS.map(mo=>
    `<button class="mood-tag${entry.mood===mo?' on':''}" data-mo="${mo}" onclick="toggleMood(this,'${mo}')">${mo}</button>`
  ).join('');

  // placed stickers html
  let stickerHtml='';
  entry.stickers.forEach((s,i)=>{
    stickerHtml+=`<span class="placed-st" data-si="${i}" style="left:${s.x}px;top:${s.y}px" ondblclick="removeStickerAt(${i})" >${s.emoji}</span>`;
  });

  div.innerHTML=`
    <div class="page-lines"></div>
    <div class="page-margin-line"></div>
    <div class="deco-tape" style="left:40px;top:-2px;width:60px;background:${TAPE_COLORS[tapeIdx]};"></div>
    <div class="deco-tape" style="right:20px;top:10px;width:40px;background:${TAPE_COLORS[(tapeIdx+3)%7]};transform:rotate(3deg);"></div>
    <span class="stamp-deco" style="right:12px;bottom:52px;color:var(--stamp)">${stampText}</span>

    <div class="daily-header">
      <div class="day-big">${d}</div>
      <div class="day-info">
        <span class="day-weekday">${wdayLabel}</span>
        <span class="day-month">${y}년 ${MONTHS[m]}</span>
      </div>
      <div class="weather-row">${wBtns}</div>
    </div>

    <div class="mood-row">
      <span class="mood-section-label">기분</span>
      ${moodBtns}
    </div>

    <div class="page-body">
      <textarea class="diary-ta" id="diary-ta"
        placeholder="오늘의 이야기를 적어요..."
        rows="10">${entry.text||''}</textarea>
      <div class="sticker-overlay" id="sticker-overlay">${stickerHtml}</div>
    </div>

    <div class="sticker-drawer" id="sticker-drawer">
      <div class="st-drawer-title">
        <span>스티커 고르기</span>
        <button class="st-close" onclick="closeStickers()">✕</button>
      </div>
      <div class="st-grid">
        ${STICKERS.map(s=>`<button class="st-item" onclick="placeSticker('${s}')">${s}</button>`).join('')}
      </div>
    </div>

    <div class="nav-bar">
      <div class="nav-side">
        <button class="nb" onclick="dayNav(-1)" ${!hasPrev?'disabled':''}>◀</button>
        <button class="nb" onclick="goMonthFromDay()">월간</button>
      </div>
      <div style="display:flex;gap:4px;align-items:center;">
        <span class="save-indicator" id="save-ind">●</span>
        <button class="nb" onclick="saveCurrentDay()">저장</button>
        <button class="nb" onclick="toggleStickers()">🎀</button>
      </div>
      <div class="nav-side">
        <button class="nb" onclick="dayNav(1)" ${!hasNext?'disabled':''}>▶</button>
      </div>
    </div>
  `;

  // after render: setup drag
  setTimeout(()=>setupStickerDrag(y,m,d), 50);

  // auto-save on type
  const ta = div.querySelector('#diary-ta');
  if(ta){
    ta.addEventListener('input',()=>{
      scheduleAutoSave(y,m,d);
      const ind=div.querySelector('#save-ind');
      if(ind){ind.textContent='○';ind.style.color='var(--muted)';}
    });
  }

  return div;
}

function toggleWeather(btn, w){
  const page = getActivePage();
  if(!page) return;
  page.querySelectorAll('.w-btn').forEach(b=>b.classList.remove('on'));
  const {y,m,d} = currentDayPage;
  const entry = loadEntry(y,m,d)||{};
  if(entry.weather===w){entry.weather='';} else {entry.weather=w;btn.classList.add('on');}
  saveEntry(y,m,d,{...entry});
  showToast(entry.weather ? entry.weather+' 기록!' : '날씨 해제');
}

function toggleMood(btn, mo){
  const page = getActivePage();
  if(!page) return;
  page.querySelectorAll('.mood-tag').forEach(b=>b.classList.remove('on'));
  const {y,m,d} = currentDayPage;
  const entry = loadEntry(y,m,d)||{};
  if(entry.mood===mo){entry.mood='';} else {entry.mood=mo;btn.classList.add('on');}
  saveEntry(y,m,d,{...entry});
}

let autoSaveTimer=null;
function scheduleAutoSave(y,m,d){
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>saveCurrentDay(true),1500);
}

function saveCurrentDay(silent=false){
  if(!currentDayPage) return;
  const {y,m,d}=currentDayPage;
  const ta=document.getElementById('diary-ta');
  if(!ta) return;
  const entry=loadEntry(y,m,d)||{weather:'',mood:'',text:'',stickers:[]};
  entry.text=ta.value;
  saveEntry(y,m,d,entry);
  const ind=document.getElementById('save-ind');
  if(ind){ind.textContent='●';ind.style.color='#6a9a6a';}
  if(!silent) showToast('저장했어요 ✓');
}

function dayNav(delta){
  saveCurrentDay(true);
  const {y,m,d}=currentDayPage;
  const nd=d+delta;
  gotoDay(y,m,nd);
}

function goMonthFromDay(){
  saveCurrentDay(true);
  currentView='month';
  flipTo(()=>buildMonthPage(currentYear,currentMonth),'backward');
}

// ───────── STICKERS ─────────
function toggleStickers(){
  const d = document.getElementById('sticker-drawer');
  if(d) d.classList.toggle('open');
}
function closeStickers(){
  const d = document.getElementById('sticker-drawer');
  if(d) d.classList.remove('open');
}

function placeSticker(emoji){
  if(!currentDayPage) return;
  const {y,m,d}=currentDayPage;
  const overlay=document.getElementById('sticker-overlay');
  if(!overlay) return;
  const rect=overlay.getBoundingClientRect();
  const x=20+Math.random()*(rect.width-60);
  const yp=20+Math.random()*120;
  const entry=loadEntry(y,m,d)||{weather:'',mood:'',text:'',stickers:[]};
  if(!entry.stickers) entry.stickers=[];
  entry.stickers.push({emoji,x,y:yp});
  saveEntry(y,m,d,entry);

  const span=document.createElement('span');
  span.className='placed-st';
  span.textContent=emoji;
  span.style.left=x+'px';
  span.style.top=yp+'px';
  span.dataset.si=entry.stickers.length-1;
  span.setAttribute('ondblclick',`removeStickerAt(${entry.stickers.length-1})`);
  overlay.appendChild(span);
  setupDragOnSpan(span,y,m,d);
  showToast(emoji+' 붙였어요!');
  closeStickers();
}

function removeStickerAt(si){
  if(!currentDayPage) return;
  const {y,m,d}=currentDayPage;
  const entry=loadEntry(y,m,d)||{stickers:[]};
  entry.stickers.splice(si,1);
  saveEntry(y,m,d,entry);
  // re-render day
  flipTo(()=>buildDayPage(y,m,d),'forward');
  showToast('스티커 제거 ✕');
}

function setupStickerDrag(y,m,d){
  const overlay=document.getElementById('sticker-overlay');
  if(!overlay) return;
  overlay.querySelectorAll('.placed-st').forEach(span=>{
    setupDragOnSpan(span,y,m,d);
  });
}

function setupDragOnSpan(span,y,m,d){
  let startTX,startTY,startX,startY;
  span.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    startTX=t.clientX;startTY=t.clientY;
    startX=parseInt(span.style.left)||0;
    startY=parseInt(span.style.top)||0;
    span.style.zIndex=50;
  },{passive:true});
  span.addEventListener('touchmove',e=>{
    e.stopPropagation();
    const t=e.touches[0];
    const dx=t.clientX-startTX;
    const dy=t.clientY-startTY;
    span.style.left=(startX+dx)+'px';
    span.style.top=(startY+dy)+'px';
  },{passive:true});
  span.addEventListener('touchend',()=>{
    span.style.zIndex='';
    const si=parseInt(span.dataset.si);
    const entry=loadEntry(y,m,d)||{stickers:[]};
    if(entry.stickers[si]){
      entry.stickers[si].x=parseInt(span.style.left)||0;
      entry.stickers[si].y=parseInt(span.style.top)||0;
      saveEntry(y,m,d,entry);
    }
  });
}

// ───────── TOAST ─────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

// ───────── INIT ─────────
window.addEventListener('load',()=>{
  ownerName=localStorage.getItem('diary-owner')||'';
  const firstPage=buildCoverPage();
  firstPage.classList.add('active');
  book.appendChild(firstPage);

  // swipe support on book
  let sx=0;
  document.getElementById('book-wrap').addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;
  },{passive:true});
  document.getElementById('book-wrap').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)<50) return;
    if(currentView==='month'){
      if(dx<0) changeMonth(1); else changeMonth(-1);
    } else if(currentView==='day'){
      const {y,m,d}=currentDayPage;
      if(dx<0&&d<daysInMonth(y,m)){dayNav(1);}
      else if(dx>0&&d>1){dayNav(-1);}
    }
  },{passive:true});
});
</script>
</body>
</html>
